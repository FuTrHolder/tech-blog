name: Auto Blog Publisher

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (generate but do not publish)"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  publish-post:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests --quiet

      - name: Refresh Blogger OAuth Token
        id: refresh_token
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          RESPONSE=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d "client_id=${GOOGLE_CLIENT_ID}" \
            -d "client_secret=${GOOGLE_CLIENT_SECRET}" \
            -d "refresh_token=${GOOGLE_REFRESH_TOKEN}" \
            -d "grant_type=refresh_token")

          ERROR=$(echo $RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('error','none'))" 2>/dev/null)
          if [ "$ERROR" != "none" ] && [ -n "$ERROR" ]; then
            echo "[ERROR] OAuth failed: $ERROR"
            exit 1
          fi

          ACCESS_TOKEN=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")

          if [ -z "$ACCESS_TOKEN" ]; then
            echo "[ERROR] Failed to get access token"
            exit 1
          fi

          echo "::add-mask::$ACCESS_TOKEN"
          echo "BLOGGER_ACCESS_TOKEN=$ACCESS_TOKEN" >> $GITHUB_ENV
          echo "[INFO] Access token refreshed successfully"

      - name: Generate and Publish Blog Post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BLOGGER_ACCESS_TOKEN: ${{ env.BLOGGER_ACCESS_TOKEN }}
          BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          python3 scripts/generate_post.py

      - name: Commit rotation state
        run: |
          git config user.name "GrowthStacker Bot"
          git config user.email "bot@growthstacker.auto"
          git add config/rotation_state.json logs/
          git diff --staged --quiet || git commit -m "chore: update rotation state [$(date -u +%Y-%m-%d)]"
          git push
        continue-on-error: true

      - name: Post summary
        if: always()
        run: |
          echo "## GrowthStacker Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Date**: $(date -u +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
