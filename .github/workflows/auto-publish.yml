name: Auto Blog Publisher

on:
  schedule:
    # Run every day at 09:00 UTC (6pm KST / early morning US EST)
    # Best time for US traffic indexing
    - cron: "0 9 * * *"

  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (generate but do not publish)"
        required: false
        default: "false"

permissions:
  contents: write   # needed to commit rotation_state.json back

jobs:
  publish-post:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout repo ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Python setup ─────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependencies ──────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt --quiet

      # ── 4. Get Blogger Access Token via refresh token ───────────────────
      - name: Refresh Blogger OAuth Token
  id: refresh_token
  env:
    GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
    GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
    GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
  run: |
    RESPONSE=$(curl -s -X POST https://oauth2.googleapis.com/token \
      -d "client_id=${GOOGLE_CLIENT_ID}" \
      -d "client_secret=${GOOGLE_CLIENT_SECRET}" \
      -d "refresh_token=${GOOGLE_REFRESH_TOKEN}" \
      -d "grant_type=refresh_token")

    # 에러 확인용 (access_token은 마스킹됨)
    echo "Response error: $(echo $RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('error','none'), d.get('error_description',''))")"

    ACCESS_TOKEN=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")

    if [ -z "$ACCESS_TOKEN" ]; then
      echo "[ERROR] Failed to get access token"
      exit 1
    fi

    echo "::add-mask::$ACCESS_TOKEN"
    echo "BLOGGER_ACCESS_TOKEN=$ACCESS_TOKEN" >> $GITHUB_ENV
    echo "[INFO] Access token refreshed successfully"

      # ── 5. Run content generator ─────────────────────────────────────────
      - name: Generate and Publish Blog Post
        env:
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          BLOGGER_ACCESS_TOKEN:  ${{ env.BLOGGER_ACCESS_TOKEN }}
          BLOGGER_BLOG_ID:       ${{ secrets.BLOGGER_BLOG_ID }}
          DRY_RUN:               ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          python3 scripts/generate_post.py

      # ── 6. Commit rotation state (so next run picks the correct niche) ──
      - name: Commit rotation state
        run: |
          git config user.name  "GrowthStacker Bot"
          git config user.email "bot@growthstacker.auto"

          git add config/rotation_state.json logs/
          git diff --staged --quiet || git commit -m "chore: update rotation state [$(date -u +%Y-%m-%d)]"
          git push
        continue-on-error: true   # Don't fail the job if nothing changed

      # ── 7. Summary ────────────────────────────────────────────────────────
      - name: Post summary
        if: always()
        run: |
          echo "## GrowthStacker Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Date**: $(date -u +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          if [ -f logs/$(date -u +%Y-%m-%d)*.json ]; then
            echo "- **Post logged**: Yes" >> $GITHUB_STEP_SUMMARY
          fi
