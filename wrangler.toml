name = "growthstacker-proxy"
main = "scripts/cloudflare-worker.js"
compatibility_date = "2024-01-01"

# Free tier: 100,000 requests/day — more than enough for daily blog posts
# Deploy with: npx wrangler deploy

[vars]
# Set these in Cloudflare Dashboard → Workers → Settings → Variables
# NEVER put actual secret values here
# RATE_LIMIT_KEY = set_in_dashboard_only
# ALLOWED_ORIGIN = https://github.com

# Routes (optional — only needed if using custom domain)
# [[routes]]
# pattern = "blog-api.yourdomain.com/*"
# zone_name = "yourdomain.com"
